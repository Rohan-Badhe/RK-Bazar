<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DMart Ready</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <a href="index.html">
                <h1>SPICE BAZAAR</h1>
                <span>Essentials</span>
            </a>
        </div>
    </header>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-container">
            <!-- Toggle Buttons -->
            <div class="form-toggle">
                <button class="toggle-btn active" id="login-toggle" onclick="showForm('login')">
                    Login
                </button>
                <button class="toggle-btn" id="register-toggle" onclick="showForm('register')">
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <form class="form-container login-form active" id="login-form">
                <h2>Welcome Back</h2>
                <p class="form-subtitle">Login to your account</p>

                <div class="input-group">
                    <label for="login-email">Email / Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="text" id="login-email" placeholder="Enter your email or phone" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                        <i class="toggle-password" onclick="togglePassword('login-password')"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="showForm('forgot')">Forgot Password?</a>
                </div>

                <button type="submit" class="submit-btn">LOGIN</button>

                <div class="social-login">
                    <p>Or login with</p>
                    <div class="social-buttons">
                        <button type="button" class="social-btn google">
                            <i class="fa-brands fa-google"></i> Google
                        </button>
                        <button type="button" class="social-btn facebook">
                            <i class="fa-brands fa-facebook-f"></i> Facebook
                        </button>
                    </div>
                </div>
            </form>

            <!-- Register Form -->
            <form class="form-container register-form" id="register-form">
                <h2>Create Account</h2>
                <p class="form-subtitle">Sign up for a new account</p>

                <div class="input-group">
                    <label for="register-name">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="register-name" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="register-email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="register-email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="register-phone">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="register-phone" placeholder="Enter your phone number" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="register-password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="register-password" placeholder="Create a password" required>
                        <i class=" toggle-password" onclick="togglePassword('register-password')"></i>
                    </div>
                    <div class="password-strength" id="password-strength"></div>
                </div>

                <div class="input-group">
                    <label for="register-confirm">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="register-confirm" placeholder="Confirm your password" required>
                    </div>
                </div>

                <div class="terms-checkbox">
                    <label>
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="#">Terms & Conditions</a></span>
                    </label>
                </div>

                <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
            </form>

            <!-- Forgot Password Form -->
            <form class="form-container forgot-form" id="forgot-form">
                <h2>Forgot Password</h2>
                <p class="form-subtitle">Enter your email to reset password</p>

                <div class="input-group">
                    <label for="forgot-email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="forgot-email" placeholder="Enter your email" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">SEND RESET LINK</button>

                <p class="back-to-login">
                    Remember your password? <a href="#" onclick="showForm('login')">Login here</a>
                </p>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 SPICE BAZAAR Ltd. All rights reserved.</p>
        </div>
    </footer>

    <script src="login.js"></script>
</body>
</html>
